name: sweep

# Vercel Hobby only allows daily crons, but the sweepers (expired locks, holds,
# escalations) and the notification outbox need to run every few minutes. So we
# drive them from GitHub Actions instead — free, and it just calls the same
# /api/cron endpoint Vercel's own daily cron does.
#
# Setup (once): in the repo → Settings → Secrets and variables → Actions, add
#   CRON_URL     = https://<your-app>.vercel.app/api/cron
#   CRON_SECRET  = the same value you set in Vercel's env vars
#
# Note: GitHub's scheduler runs on a best-effort basis and can lag a few minutes
# under load. That's fine here — a lock returning to the queue a few minutes late
# hurts nobody. For tighter timing, cron-job.org (free, 1-minute) or Vercel Pro.

on:
  schedule:
    # GitHub fires this every 5 min (its reliable floor); the job then LOOPS,
    # pinging /api/cron every ~60s, so detection (crypto/PayPal/Stripe fallback)
    # is near-instant — roughly one minute end-to-end. This repo is public, so the
    # Actions minutes are free.
    #
    # TRADE-OFF: polling this often keeps the Neon database awake ~24/7 instead of
    # auto-suspending, which uses more of Neon's compute allowance. That's the cost
    # of near-instant detection. The player's deposit window is unaffected — club
    # deposits hold 24h — so a slow payer still has plenty of time.
    - cron: '*/5 * * * *'
  workflow_dispatch: {}       # lets you trigger it by hand from the Actions tab

# Never run two overlapping loops.
concurrency:
  group: sweep
  cancel-in-progress: false

jobs:
  sweep:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Poll the cron endpoint every ~minute for the 5-min window
        shell: bash
        run: |
          set +e   # a slow/failed curl must NOT fail the whole job
          if [ -z "${{ secrets.CRON_URL }}" ]; then
            echo "CRON_URL secret not set — skipping"; exit 0
          fi
          for i in 1 2 3 4 5; do
            code=$(curl -s -m 90 -o /tmp/out -w "%{http_code}" \
              -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
              "${{ secrets.CRON_URL }}")
            echo "[$i] HTTP $code"; cat /tmp/out 2>/dev/null; echo
            [ "$i" = "5" ] && break
            sleep 55
          done
          exit 0
